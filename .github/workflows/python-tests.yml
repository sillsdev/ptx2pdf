name: Python Tests
# test trigger

on:
  push:
    branches:
      - master
    paths:
      - 'python/**'
      - 'src/**'
      - 'test/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
  pull_request:
    branches:
      - master
    paths:
      - 'python/**'
      - 'src/**'
      - 'test/**'
      - 'pyproject.toml'
      - '.github/workflows/python-tests.yml'
  workflow_dispatch:

# Required for publish-unit-test-result-action to post check runs and PR comments
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # ── Job 1: Pure Python unit tests (no XeTeX required) ──────────────────────
  unit-tests:
    name: Unit Tests (test_usfmx)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install package
        run: pip install -e .

      - name: Install pytest
        run: pip install pytest

      - name: Run unit tests
        working-directory: test
        run: pytest test_usfmx.py -v --junit-xml=../unit-test-results.xml

      - name: Publish unit test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: unit-test-results.xml
          check_name: Unit Test Results

  # ── Job 2: Integration tests — runs XeTeX, diffs PDFs against baselines ────
  integration-tests:
    name: Integration Tests (test_projects)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          # Must match Ubuntu 24.04's system Python so the python3-gi C
          # extension (_gi.cpython-312-*.so) is ABI-compatible.
          python-version: '3.12'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-xetex \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            fonts-sil-charis \
            fonts-sil-doulos \
            fonts-sil-andika \
            python3-gi \
            python3-gi-cairo \
            gir1.2-gtk-3.0 \
            gir1.2-poppler-0.18 \
            xvfb

      - name: Install package
        run: |
          pip install -e .
          # The test harness spawns python/scripts/ptxprint as a subprocess via
          # its #!/usr/bin/python3 shebang, which hits the system Python rather
          # than the setup-python venv. Redirect the shebang to the venv Python
          # so that installed dependencies (regex, fonttools, etc.) are found.
          sudo ln -sf "$(which python3)" /usr/bin/python3
          # Make the apt-installed python3-gi visible to the venv. Building
          # pygobject from source on Ubuntu 24.04 requires girepository-2.0
          # which conflicts with apt package naming, so we use the distro gi.
          echo "PYTHONPATH=/usr/lib/python3/dist-packages" >> "$GITHUB_ENV"

      - name: Install pytest
        run: pip install pytest

      - name: Create tmp projects directory for archive verification
        run: mkdir -p test/tmp

      - name: Run integration tests
        working-directory: test
        run: >
          xvfb-run --auto-servernum
          pytest test_projects.py -v
          --tb=short
          -S 10
          --junit-xml=../integration-test-results.xml

      - name: Publish integration test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: integration-test-results.xml
          check_name: Integration Test Results

      - name: Upload diff PDFs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: pdf-diffs
          path: test/projects/**/local/**/*_diff.pdf
          if-no-files-found: ignore

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: ptxprint-logs
          path: test/ptxprint_*.log
          if-no-files-found: ignore
